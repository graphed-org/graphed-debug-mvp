<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>graphed · live execution</title>
  <!-- Perspective is VENDORED (works offline) at the EXACT version of the installed
       `perspective-python` server (4.5.1). `perspective-dashboard.js` is a single self-contained
       bundle (client + viewer + Datagrid plugin + inlined wasm) produced by the esbuild recipe in
       tools/dashboard-build/; the client/server share a versioned wire protocol so the two MUST
       match. Re-run that build (and re-pin perspective-python together) to upgrade. -->
  <link rel="stylesheet" href="/static/vendor/themes.css" />
  <script type="module">
    // default export = the perspective client; importing the bundle also registers
    // <perspective-viewer> and the Datagrid plugin as a side effect.
    import perspective from "/static/vendor/perspective-dashboard.js";

    const wsUrl = `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/websocket`;
    const client = await perspective.websocket(wsUrl);

    async function bind(id, name, config) {
      const table = await client.open_table(name);
      const viewer = document.getElementById(id);
      await viewer.load(table);
      await viewer.restore({ theme: "Pro Dark", plugin: "Datagrid", ...config });
    }
    // All three panels use the built-in Datagrid (robust on empty/streaming data; the d3fc plots
    // throw on degenerate data). stats = live counters; tasks = per-task state (latest first);
    // profile = sampled self/total time aggregated by function.
    await bind("stats", "stats", {});
    await bind("tasks", "tasks", { sort: [["t", "desc"]] });
    await bind("profile", "profile", {
      group_by: ["function"],
      columns: ["self_us", "total_us"],
      aggregates: { self_us: "sum", total_us: "sum" },
      sort: [["self_us", "desc"]],
    });
    document.body.removeAttribute("data-loading");
  </script>
  <style>
    :root { --line:#262b36; }
    html, body { margin:0; height:100%; background:#0f1116; color:#d7dbe3;
      font:13px ui-monospace, SFMono-Regular, Menlo, monospace; }
    header { padding:10px 16px; border-bottom:1px solid var(--line); font-weight:600; letter-spacing:.04em; }
    header span { color:#5b9dff; }
    .grid { display:grid; grid-template-rows:auto 1fr 1fr; gap:10px; padding:10px;
      height:calc(100% - 42px); box-sizing:border-box; }
    perspective-viewer { border:1px solid var(--line); border-radius:8px; }
    #stats { height:120px; }
    .label { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:#8b93a5; margin:2px 2px -4px; }
  </style>
</head>
<body data-loading>
  <header>graphed <span>· live execution</span></header>
  <div class="grid">
    <perspective-viewer id="stats"></perspective-viewer>
    <div style="display:grid; grid-template-rows:auto 1fr;"><div class="label">tasks</div>
      <perspective-viewer id="tasks"></perspective-viewer></div>
    <div style="display:grid; grid-template-rows:auto 1fr;"><div class="label">profile (sampled self-time by function)</div>
      <perspective-viewer id="profile"></perspective-viewer></div>
  </div>
</body>
</html>
