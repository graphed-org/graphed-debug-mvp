name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CORE: "graphed-core @ git+https://github.com/graphed-org/graphed-core-mvp@main"
  FRONTEND: "graphed @ git+https://github.com/graphed-org/graphed-mvp@main"
  NUMPY: "graphed-numpy @ git+https://github.com/graphed-org/graphed-numpy-mvp@main"
  AWKWARD: "graphed-awkward @ git+https://github.com/graphed-org/graphed-awkward-mvp@main"
  CORPUS: "graphed-corpus @ git+https://github.com/graphed-org/graphed-corpus-mvp@main"

jobs:
  test:
    name: test ${{ matrix.os }} py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Install deps + this package
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install "${{ env.CORE }}"
          python -m pip install "${{ env.FRONTEND }}" "${{ env.NUMPY }}" "${{ env.AWKWARD }}" "${{ env.CORPUS }}"
          # the dashboard extra (Perspective/Tornado/websocket/pyinstrument) installs via abi3 wheels
          # on cp311-cp314; the M37 dashboard tests importorskip it, so a leg without it just skips.
          python -m pip install -e ".[dev,dashboard]"
      - name: Ruff
        run: |
          ruff check .
          ruff format --check .
      - name: Mypy (strict)
        run: mypy
      - name: Pytest + coverage gate (>=90%)
        run: pytest tests/frozen --cov=graphed_debug --cov-branch --cov-report=term-missing

  # Free-threaded / bleeding-edge Pythons (plan A.5). Experimental and non-blocking: the awkward
  # wheels may lag on 3.14 / 3.14t.
  test-experimental:
    name: test (experimental) py${{ matrix.python }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python: ["3.14t"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
      - shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install "${{ env.CORE }}"
          python -m pip install "${{ env.FRONTEND }}" "${{ env.NUMPY }}" "${{ env.AWKWARD }}" "${{ env.CORPUS }}"
          python -m pip install -e ".[dev]"
          pytest tests/frozen

  # The live dashboard's BROWSER render, in headless Chromium (M37). The matrix `test` job can't see
  # this: a Perspective client/server version mismatch or a missing plugin only fails in a browser.
  # Heavy (a real browser), so it runs once here rather than across the matrix; the matrix's dashboard
  # tests importorskip Playwright and skip the smoke test.
  dashboard-smoke:
    name: dashboard browser smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install "${{ env.CORE }}"
          python -m pip install "${{ env.FRONTEND }}" "${{ env.NUMPY }}" "${{ env.AWKWARD }}" "${{ env.CORPUS }}"
          python -m pip install -e ".[dev,dashboard]"
          python -m pip install playwright
          python -m playwright install --with-deps chromium
          pytest tests/frozen/m37/test_dashboard_browser.py -q -p no:cacheprovider

  docs:
    name: docs (sphinx -W)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install "${{ env.CORE }}" "${{ env.FRONTEND }}"
          # docs only needs the runtime deps + sphinx; the dev extra's backends (numpy/awkward/corpus)
          # are not on PyPI and are only needed by the test-suite, not by autodoc.
          python -m pip install -e ".[docs]"
          sphinx-build -W -b html docs docs/_build/html
